services:
  counterguy-bot:
    image: ${IMAGE:-counterguy-bot:local}
    container_name: counterguy-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Persist DB in a mounted volume (overrideable via .env)
      DB_FILE: ${DB_FILE:-/data/voice_data.db}
      # Keep Node memory bounded on tiny VPSes
      NODE_OPTIONS: ${NODE_OPTIONS:---max-old-space-size=128}
    volumes:
      - counterguy_data:/data

volumes:
  counterguy_data:
